apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: poc-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<YOUR_GH_ORG_OR_USER>/demo-cd.git
    targetRevision: main
    path: apps/poc
  destination:
    server: https://kubernetes.default.svc
    namespace: poc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
