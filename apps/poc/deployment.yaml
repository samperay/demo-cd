apiVersion: apps/v1
kind: Deployment
metadata:
  name: poc-app
  namespace: poc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: poc-app
  template:
    metadata:
      labels:
        app: poc-app
    spec:
      containers:
        - name: poc-app
          image: ghcr.io/samperay/cicd-poc-app:a2bd6e26b00370dab631b3eac3c4ac65519ec782
          ports:
            - containerPort: 8080
