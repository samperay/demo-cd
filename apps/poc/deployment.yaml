apiVersion: apps/v1
kind: Deployment
metadata:
  name: poc-app
  namespace: poc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: poc-app
  template:
    metadata:
      labels:
        app: poc-app
    spec:
      containers:
        - name: poc-app
          image: ghcr.io/samperay/cicd-poc-app:17caa200e8c0d489110316f62fd57ff2f7958efa
          ports:
            - containerPort: 8080
